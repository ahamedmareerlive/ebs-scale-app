# ✅ Fetch ONLY latest NEW CR
- name: Build ServiceNow query
  set_fact:
    snow_query: "{{ 'short_descriptionLIKEDisk^state=-5^ORDERBYDESCsys_created_on' | urlencode }}"

# ✅ Debug URL
- name: Show API URL
  debug:
    msg: "{{ snow_instance }}/api/now/table/change_request?sysparm_query={{ snow_query }}"

# ✅ Fetch CRs
- name: Fetch Change Requests
  uri:
    url: "{{ snow_instance }}/api/now/table/change_request?sysparm_query={{ snow_query }}"
    method: GET
    user: "{{ snow_user }}"
    password: "{{ snow_password }}"
    force_basic_auth: yes
    return_content: yes
    headers:
      Accept: "application/json"
  register: cr_response

# ✅ Debug full response
- name: Show full response
  debug:
    var: cr_response.json.result

# ✅ Ensure at least 1 result
- name: Fail if no CR found
  fail:
    msg: "No NEW CR found"
  when: cr_response.json.result | length == 0

# ✅ Pick ONLY latest CR ✅
- name: Select latest CR
  set_fact:
    latest_cr: "{{ cr_response.json.result[0] }}"

# ✅ Show selected CR
- name: Show selected CR
  debug:
    msg: "✅ Processing ONLY latest ticket: {{ latest_cr.number }}"
