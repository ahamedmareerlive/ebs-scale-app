# ✅ Extract Volume ID
- name: Extract Volume ID
  set_fact:
    volume_id: "{{ cr.description | regex_search('vol-[a-zA-Z0-9]+') }}"

# ✅ Extract Target Size
- name: Extract Target Size
  set_fact:
    target_size: "{{ cr.description | regex_search('[0-9]+') | int }}"

# ✅ Validate inputs (IMPORTANT 🔥)
- name: Fail if volume_id missing
  fail:
    msg: "Volume ID not found in ticket {{ cr.number }}"
  when: volume_id is not defined

- name: Fail if invalid size
  fail:
    msg: "Invalid target size in ticket {{ cr.number }}"
  when: target_size <= 0

# ✅ Print details in AAP logs ✅
- name: Show CR details
  debug:
    msg:
      - "Ticket: {{ cr.number }}"
      - "Volume ID: {{ volume_id }}"
      - "Target Size: {{ target_size }}GB"

# ✅ Get current volume info (IAM ROLE USED ✅)
- name: Get current volume info
  amazon.aws.ec2_vol_info:
    region: "{{ aws_region }}"
    volume_ids:
      - "{{ volume_id }}"
  register: vol_info

# ✅ Current size
- name: Set current size
  set_fact:
    current_size: "{{ vol_info.volumes[0].size }}"

# ✅ Show size comparison
- debug:
    msg: "Current size: {{ current_size }}GB → Target: {{ target_size }}GB"

# ✅ SCALE BLOCK
- block:

    - name: Scale EBS volume ✅
      amazon.aws.ec2_vol:
        region: "{{ aws_region }}"
        volume_id: "{{ volume_id }}"
        size: "{{ target_size }}"
        state: present
      when: target_size > current_size

    - name: Wait for AWS update
      pause:
        seconds: 20

    # ✅ Filesystem resize
    - name: Resize filesystem ✅
      shell: |
        if df -Th | grep xfs; then
          xfs_growfs /
        else
          growpart /dev/xvda 1
          resize2fs /dev/xvda1
        fi

    - name: Set success status
      set_fact:
        scale_status: "SUCCESS"

  rescue:

    - name: Set failure status
      set_fact:
        scale_status: "FAILED"

# ✅ Print final status
- name: Show result
  debug:
    msg: "Ticket {{ cr.number }} → Status: {{ scale_status }}"

# ✅ Update ServiceNow ✅
- name: Update ServiceNow
  uri:
    url: "{{ snow_instance }}/api/now/table/change_request/{{ cr.sys_id }}"
    method: PATCH
    user: "{{ snow_user }}"
    password: "{{ snow_password }}"
    force_basic_auth: yes
    body_format: json
    headers:
      Content-Type: "application/json"
    body:
      work_notes: |
        ✅ Automation Update

        Ticket: {{ cr.number }}
        Volume ID: {{ volume_id }}
        Target Size: {{ target_size }}GB
        Status: {{ scale_status }}
        Time: {{ ansible_date_time.iso8601 }}

        Message: Volume processed via AAP automation.
      state: "Implement"
