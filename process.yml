# ✅ Extract Volume ID
- name: Extract Volume ID
  set_fact:
    volume_id: "{{ cr.description | regex_search('vol-[a-zA-Z0-9]+') }}"

# ✅ Extract Target Size (SAFE ✅)
- name: Extract Target Size
  set_fact:
    target_size: "{{ (cr.description | regex_search('([0-9]+)GB', '\\1')) | int }}"

# ✅ Ensure integer
- name: Force integer type
  set_fact:
    target_size: "{{ target_size | int }}"

# ✅ DEBUG TYPES
- name: Debug size type
  debug:
    msg: "Size={{ target_size }} | Type={{ target_size | type_debug }}"

# ✅ Validate Volume ID
- name: Validate Volume ID
  fail:
    msg: "Volume ID missing in {{ cr.number }}"
  when: volume_id is not defined

# ✅ Validate Size ✅ (FIXED)
- name: Validate Size
  fail:
    msg: "Invalid size in {{ cr.number }}"
  when: (target_size | int) <= 0

# ✅ Debug details
- name: Show CR details
  debug:
    msg:
      - "Ticket: {{ cr.number }}"
      - "Volume ID: {{ volume_id }}"
      - "Target Size: {{ target_size }}GB"

# ✅ Get current EBS info
- name: Get volume info
  amazon.aws.ec2_vol_info:
    region: "{{ aws_region }}"
    volume_ids:
      - "{{ volume_id }}"
  register: vol_info

# ✅ Current size
- name: Set current size
  set_fact:
    current_size: "{{ vol_info.volumes[0].size }}"

# ✅ Compare
- name: Show comparison
  debug:
    msg: "Current={{ current_size }}GB | Target={{ target_size }}GB"

# ✅ SCALE BLOCK
- block:

    - name: Scale EBS volume
      amazon.aws.ec2_vol:
        region: "{{ aws_region }}"
        volume_id: "{{ volume_id }}"
        size: "{{ target_size }}"
        state: present
      when: target_size > current_size

    - name: Wait for AWS
      pause:
        seconds: 20

    # ✅ Filesystem resize
    - name: Resize filesystem
      shell: |
        if df -Th | grep xfs; then
          xfs_growfs /
        else
          growpart /dev/xvda 1
          resize2fs /dev/xvda1
        fi

    - name: Mark success
      set_fact:
        scale_status: "SUCCESS"

  rescue:

    - name: Mark failure
      set_fact:
        scale_status: "FAILED"

# ✅ Final status
- name: Show result
  debug:
    msg: "Ticket {{ cr.number }} → {{ scale_status }}"

# ✅ Update ServiceNow
- name: Update ServiceNow
  uri:
    url: "{{ snow_instance }}/api/now/table/change_request/{{ cr.sys_id }}"
    method: PATCH
    user: "{{ snow_user }}"
    password: "{{ snow_password }}"
    force_basic_auth: yes
    body_format: json
    headers:
      Content-Type: "application/json"
    body:
      state: "-2"   # Implement state ✅
      work_notes: |
        ✅ Automation Update

        Ticket: {{ cr.number }}
        Volume ID: {{ volume_id }}
        Target Size: {{ target_size }}GB
        Status: {{ scale_status }}
        Time: {{ ansible_date_time.iso8601 }}

        Message: Auto processed from NEW state.
