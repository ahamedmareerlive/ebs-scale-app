# ✅ Extract Volume ID
- name: Extract Volume ID
  set_fact:
    volume_id: "{{ cr.description | regex_search('vol-[a-zA-Z0-9]+') }}"

# ✅ Extract Target Size (FINAL FIX ✅)
- name: Extract target size safely
  set_fact:
    target_size_raw: "{{ (cr.description | regex_findall('(?i)scale.*?([0-9]+)')) | first | default('0') }}"

# ✅ Convert to integer
- name: Convert size
  set_fact:
    target_size: "{{ target_size_raw | int }}"

# ✅ Debug values
- name: Debug values
  debug:
    msg:
      - "Ticket: {{ cr.number }}"
      - "Volume: {{ volume_id }}"
      - "Description: {{ cr.description }}"
      - "Raw Size: {{ target_size_raw }}"
      - "Final Size: {{ target_size }}"
      - "Type: {{ target_size | type_debug }}"

# ✅ Validate inputs
- name: Validate Volume ID
  fail:
    msg: "❌ Volume ID missing in {{ cr.number }}"
  when: volume_id is not defined

- name: Validate Target Size
  fail:
    msg: "❌ Invalid size in {{ cr.number }}"
  when: (target_size | int) <= 0

# ✅ Get EBS info
- name: Get volume info
  amazon.aws.ec2_vol_info:
    region: "{{ aws_region }}"
    filters:
      volume-id: "{{ volume_id }}"
  register: vol_info

# ✅ Extract current size
- name: Set current size
  set_fact:
    current_size: "{{ vol_info.volumes[0].size | int }}"

# ✅ Extract AZ
- name: Get volume AZ
  set_fact:
    volume_zone: "{{ vol_info.volumes[0].zone }}"

# ✅ Debug comparison
- name: Compare sizes
  debug:
    msg:
      - "Current Size: {{ current_size }}GB"
      - "Target Size: {{ target_size }}GB"
      - "AZ: {{ volume_zone }}"

# ✅ SCALE BLOCK
- block:

    # ✅ Scale EBS
    - name: Scale EBS volume
      amazon.aws.ec2_vol:
        region: "{{ aws_region }}"
        id: "{{ volume_id }}"
        volume_size: "{{ target_size }}"
        modify_volume: true
        zone: "{{ volume_zone }}"
      when: (target_size | int) > (current_size | int)

    # ✅ Wait
    - name: Wait for EBS modification
      pause:
        seconds: 20

    # ✅ Detect root disk (FIXED ✅)
    - name: Detect root disk
      shell: lsblk -no PKNAME $(df / | tail -1 | awk '{print $1}')
      register: root_disk

    # ✅ Clean output
    - name: Clean root disk output
      set_fact:
        root_disk_clean: "{{ root_disk.stdout | trim }}"

    # ✅ Validate detection
    - name: Fail if disk not detected
      fail:
        msg: "❌ Could not detect root disk"
      when: root_disk_clean == ""

    # ✅ Set disk paths
    - name: Set disk paths
      set_fact:
        disk_device: "/dev/{{ root_disk_clean }}"
        partition_device: "/dev/{{ root_disk_clean }}1"

    # ✅ Debug disk
    - name: Show disk info
      debug:
        msg:
          - "Disk Device: {{ disk_device }}"
          - "Partition Device: {{ partition_device }}"

    # ✅ Resize filesystem
    - name: Resize filesystem
      shell: |
        growpart {{ disk_device }} 1 || true

        if df -Th | grep xfs; then
          xfs_growfs /
        else
          resize2fs {{ partition_device }}
        fi

    - name: Mark success
      set_fact:
        scale_status: "SUCCESS"

  rescue:

    - name: Mark failure
      set_fact:
        scale_status: "FAILED"

# ✅ Final result
- name: Show result
  debug:
    msg: "✅ Ticket {{ cr.number }} → {{ scale_status }}"

# ✅ Update ServiceNow (SAFE ✅)
- name: Update CR in ServiceNow
  uri:
    url: "{{ snow_instance }}/api/now/table/change_request/{{ cr.sys_id }}"
    method: PATCH
    user: "{{ snow_user }}"
    password: "{{ snow_password }}"
    force_basic_auth: yes
    body_format: json
    headers:
      Content-Type: "application/json"
    body:
      work_notes: |
        ✅ Automation Update

        Ticket: {{ cr.number }}
        Volume ID: {{ volume_id }}
        Old Size: {{ current_size }}GB
        New Size: {{ target_size }}GB
        Status: {{ scale_status }}
        Time: {{ ansible_date_time.iso8601 }}

        Message: EBS scaling and filesystem resize completed successfully.

