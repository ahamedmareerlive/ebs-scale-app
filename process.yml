# ✅ Extract Volume ID
- name: Extract Volume ID
  set_fact:
    volume_id: "{{ cr.description | regex_search('vol-[a-zA-Z0-9]+') }}"

# ✅ Extract Target Size (FINAL FIX ✅)
- name: Extract target size
  set_fact:
    target_size_raw: "{{ (cr.description | regex_findall('(?i)scale.*?([0-9]+)')) | first | default('0') }}"

# ✅ Convert to integer
- name: Convert size
  set_fact:
    target_size: "{{ target_size_raw | int }}"

# ✅ DEBUG
- name: Debug values
  debug:
    msg:
      - "Ticket: {{ cr.number }}"
      - "Volume: {{ volume_id }}"
      - "Description: {{ cr.description }}"
      - "Raw Size: {{ target_size_raw }}"
      - "Final Size: {{ target_size }}"

# ✅ Validate
- name: Validate Volume ID
  fail:
    msg: "❌ Volume ID missing"
  when: volume_id is not defined

- name: Validate Target Size
  fail:
    msg: "❌ Invalid size"
  when: (target_size | int) <= 0

# ✅ Get volume info
- name: Get volume info
  amazon.aws.ec2_vol_info:
    region: "{{ aws_region }}"
    filters:
      volume-id: "{{ volume_id }}"
  register: vol_info

# ✅ Current size
- name: Set current size
  set_fact:
    current_size: "{{ vol_info.volumes[0].size | int }}"

# ✅ Get AZ
- name: Get volume AZ
  set_fact:
    volume_zone: "{{ vol_info.volumes[0].zone }}"

# ✅ Prevent shrinking (IMPORTANT ✅)
- name: Prevent volume shrink
  fail:
    msg: "❌ Cannot decrease volume size (Current={{ current_size }}GB, Target={{ target_size }}GB)"
  when: (target_size | int) < (current_size | int)

# ✅ Compare
- name: Compare sizes
  debug:
    msg:
      - "Current: {{ current_size }}GB"
      - "Target: {{ target_size }}GB"
      - "AZ: {{ volume_zone }}"

# ✅ SCALE BLOCK
- block:

    - name: Scale EBS volume
      amazon.aws.ec2_vol:
        region: "{{ aws_region }}"
        id: "{{ volume_id }}"
        volume_size: "{{ target_size }}"
        modify_volume: true
        zone: "{{ volume_zone }}"
      when: (target_size | int) > (current_size | int)

    - name: Wait
      pause:
        seconds: 20

    # ✅ Detect disk
    - name: Detect root disk
      shell: lsblk -no PKNAME $(df / | tail -1 | awk '{print $1}')
      register: root_disk

    - name: Clean disk name
      set_fact:
        root_disk_clean: "{{ root_disk.stdout | trim }}"

    - name: Fail if disk missing
      fail:
        msg: "❌ Disk detection failed"
      when: root_disk_clean == ""

    # ✅ FIX NVMe + xvda naming
    - name: Set disk paths
      set_fact:
        disk_device: "/dev/{{ root_disk_clean }}"
        partition_device: >-
          {% if 'nvme' in root_disk_clean %}
          /dev/{{ root_disk_clean }}p1
          {% else %}
          /dev/{{ root_disk_clean }}1
          {% endif %}

    - name: Debug disk
      debug:
        msg:
          - "Disk: {{ disk_device }}"
          - "Partition: {{ partition_device }}"

    # ✅ Resize filesystem (FINAL FIX ✅)
    - name: Resize filesystem
      shell: |
        growpart {{ disk_device }} 1 || true

        if df -Th | grep xfs; then
          xfs_growfs /
        else
          resize2fs {{ partition_device }}
        fi

    - name: Success
      set_fact:
        scale_status: "SUCCESS"

  rescue:
    - name: Failure
      set_fact:
        scale_status: "FAILED"

# ✅ Final log
- name: Show result
  debug:
    msg: "✅ Ticket {{ cr.number }} → {{ scale_status }}"

# ✅ Update ServiceNow
- name: Update CR
  uri:
    url: "{{ snow_instance }}/api/now/table/change_request/{{ cr.sys_id }}"
    method: PATCH
    user: "{{ snow_user }}"
    password: "{{ snow_password }}"
    force_basic_auth: yes
    body_format: json
    headers:
      Content-Type: "application/json"
    body:
      work_notes: |
        ✅ Automation Update

        Ticket: {{ cr.number }}
        Volume ID: {{ volume_id }}
        Old Size: {{ current_size }}GB
        New Size: {{ target_size }}GB
        Status: {{ scale_status }}
        Time: {{ ansible_date_time.iso8601 }}

