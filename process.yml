# ✅ Extract Volume ID
- name: Extract Volume ID
  set_fact:
    volume_id: "{{ cr.description | regex_search('vol-[a-zA-Z0-9]+') }}"

# ✅ Extract Target Size (FINAL ROBUST FIX ✅)
- name: Extract target size safely
  set_fact:
    target_size_raw: "{{ (cr.description | regex_search('(?i)scale.*?([0-9]+)', '\\1')) | default('0') }}"

# ✅ Convert to integer
- name: Convert size
  set_fact:
    target_size: "{{ target_size_raw | int }}"

# ✅ DEBUG
- name: Debug extracted values
  debug:
    msg:
      - "Ticket: {{ cr.number }}"
      - "Volume: {{ volume_id }}"
      - "Description: {{ cr.description }}"
      - "Raw Size: {{ target_size_raw }}"
      - "Final Size: {{ target_size }}"
      - "Type: {{ (target_size | int) | type_debug }}"

# ✅ Validate Volume ID
- name: Validate Volume ID
  fail:
    msg: "❌ Volume ID missing in {{ cr.number }}"
  when: volume_id is not defined

# ✅ Validate Target Size (IMPORTANT)
- name: Validate Target Size
  fail:
    msg: "❌ Could not extract valid size from description: {{ cr.description }}"
  when: target_size <= 0

# ✅ Get EBS volume info
- name: Get volume info
  amazon.aws.ec2_vol_info:
    region: "{{ aws_region }}"
    filters:
      volume-id: "{{ volume_id }}"
  register: vol_info

# ✅ Extract current size
- name: Set current size
  set_fact:
    current_size: "{{ vol_info.volumes[0].size | int }}"

# ✅ Extract AZ
- name: Get volume AZ
  set_fact:
    volume_zone: "{{ vol_info.volumes[0].zone }}"

# ✅ DEBUG COMPARISON
- name: Compare sizes
  debug:
    msg:
      - "Current Size: {{ current_size }}GB"
      - "Target Size: {{ target_size }}GB"
      - "AZ: {{ volume_zone }}"

# ✅ SCALE BLOCK
- block:

    # ✅ SCALE EBS (FINAL FIX ✅)
    - name: Scale EBS volume
      amazon.aws.ec2_vol:
        region: "{{ aws_region }}"
        id: "{{ volume_id }}"
        volume_size: "{{ target_size }}"
        modify_volume: true
        zone: "{{ volume_zone }}"
      when: target_size > current_size

    # ✅ WAIT (simple)
    - name: Wait for EBS modification
      pause:
        seconds: 20

    # ✅ DETECT ROOT DISK (DYNAMIC ✅)
    - name: Detect root disk
      shell: lsblk -no PKNAME $(df / | tail -1 | awk '{print $1}')
      register: root_disk

    # ✅ SET DEVICES
    - name: Set disk paths
      set_fact:
        disk_device: "/dev/{{ root_disk.stdout }}"
        partition_device: "{{ disk_device }}1"

    # ✅ DEBUG DISK
    - name: Show disk info
      debug:
        msg:
          - "Disk: {{ disk_device }}"
          - "Partition: {{ partition_device }}"

    # ✅ RESIZE FILESYSTEM ✅
    - name: Resize filesystem
      shell: |
        growpart {{ disk_device }} 1 || true

        if df -Th | grep xfs; then
          xfs_growfs /
        else
          resize2fs {{ partition_device }}
        fi

    - name: Mark success
      set_fact:
        scale_status: "SUCCESS"

  rescue:

    - name: Mark failure
      set_fact:
        scale_status: "FAILED"

# ✅ FINAL RESULT
- name: Show result
  debug:
    msg: "✅ Ticket {{ cr.number }} → {{ scale_status }}"

# ✅ UPDATE SERVICENOW (SAFE ✅)
- name: Update CR in ServiceNow
  uri:
    url: "{{ snow_instance }}/api/now/table/change_request/{{ cr.sys_id }}"
    method: PATCH
    user: "{{ snow_user }}"
    password: "{{ snow_password }}"
    force_basic_auth: yes
    body_format: json
    headers:
      Content-Type: "application/json"
    body:
      work_notes: |
        ✅ Automation Update

        Ticket: {{ cr.number }}
        Volume ID: {{ volume_id }}
        Old Size: {{ current_size }}GB
        New Size: {{ target_size }}GB
        Status: {{ scale_status }}
        Time: {{ ansible_date_time.iso8601 }}

        Message: EBS volume scaled and filesystem resized successfully.
