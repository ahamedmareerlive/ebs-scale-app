# ✅ Extract Volume ID
- name: Extract Volume ID
  set_fact:
    volume_id: "{{ cr.description | regex_search('vol-[a-zA-Z0-9]+') }}"

# ✅ Extract Size
- name: Extract raw size
  set_fact:
    target_size_raw: "{{ cr.description | regex_search('[0-9]+') }}"

# ✅ Convert to int
- name: Convert size
  set_fact:
    target_size: "{{ target_size_raw | int }}"

# ✅ Debug values
- name: Debug extracted values
  debug:
    msg:
      - "Ticket: {{ cr.number }}"
      - "Volume: {{ volume_id }}"
      - "Raw Size: {{ target_size_raw }}"
      - "Final Size: {{ target_size | int }}"
      - "Type: {{ (target_size | int) | type_debug }}"

# ✅ Validate
- name: Validate Volume ID
  fail:
    msg: "Volume ID missing"
  when: volume_id is not defined

- name: Validate Size
  fail:
    msg: "Invalid size"
  when: (target_size | int) <= 0

# ✅ Get EBS info (FIXED ✅)
- name: Get volume info
  amazon.aws.ec2_vol_info:
    region: "{{ aws_region }}"
    filters:
      volume-id: "{{ volume_id }}"
  register: vol_info

# ✅ Convert current size (FIXED ✅)
- name: Set current size
  set_fact:
    current_size: "{{ vol_info.volumes[0].size | int }}"

# ✅ Debug comparison
- name: Show comparison
  debug:
    msg: "Current={{ current_size | int }}GB → Target={{ target_size | int }}GB"

# ✅ SCALE BLOCK
- block:

    - name: Scale EBS ✅
      amazon.aws.ec2_vol:
        region: "{{ aws_region }}"
        volume_id: "{{ volume_id }}"
        size: "{{ target_size | int }}"
        state: present
      when: (target_size | int) > (current_size | int)

    - name: Wait for EBS update
      pause:
        seconds: 20

    # ✅ Resize filesystem
    - name: Resize filesystem
      shell: |
        if df -Th | grep xfs; then
          xfs_growfs /
        else
          growpart /dev/xvda 1
          resize2fs /dev/xvda1
        fi

    - name: Success
      set_fact:
        scale_status: "SUCCESS"

  rescue:

    - name: Failure
      set_fact:
        scale_status: "FAILED"

# ✅ Final log
- name: Show result
  debug:
    msg: "✅ Ticket {{ cr.number }} → {{ scale_status }}"

# ✅ Update ServiceNow (FIXED ✅)
- name: Update CR
  uri:
    url: "{{ snow_instance }}/api/now/table/change_request/{{ cr.sys_id }}"
    method: PATCH
    user: "{{ snow_user }}"
    password: "{{ snow_password }}"
    force_basic_auth: yes
    body_format: json
    headers:
      Content-Type: "application/json"
    body:
      state: "-4"   # ✅ SAFE (Assess state)
      work_notes: |
        ✅ Automation Update

        Ticket: {{ cr.number }}
        Volume: {{ volume_id }}
        Size: {{ target_size | int }}GB
        Status: {{ scale_status }}
        Time: {{ ansible_date_time.iso8601 }}
