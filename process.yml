# ✅ Extract Volume ID
- name: Extract Volume ID
  set_fact:
    volume_id: "{{ cr.description | regex_search('vol-[a-zA-Z0-9]+') }}"

# ✅ Extract Target Size
- name: Extract raw size
  set_fact:
    target_size_raw: "{{ cr.description | regex_search('[0-9]+') }}"

# ✅ Convert to integer
- name: Convert size
  set_fact:
    target_size: "{{ target_size_raw | int }}"

# ✅ Debug extracted values
- name: Debug values
  debug:
    msg:
      - "Ticket: {{ cr.number }}"
      - "Volume: {{ volume_id }}"
      - "Raw Size: {{ target_size_raw }}"
      - "Final Size: {{ target_size | int }}"
      - "Type: {{ (target_size | int) | type_debug }}"

# ✅ Validate Volume ID
- name: Validate Volume
  fail:
    msg: "❌ Volume ID missing in {{ cr.number }}"
  when: volume_id is not defined

# ✅ Validate Size
- name: Validate Size
  fail:
    msg: "❌ Invalid size in {{ cr.number }}"
  when: (target_size | int) <= 0

# ✅ Get EBS volume details (FIXED ✅)
- name: Get volume info
  amazon.aws.ec2_vol_info:
    region: "{{ aws_region }}"
    filters:
      volume-id: "{{ volume_id }}"
  register: vol_info

# ✅ Extract current size (FIX TYPE ✅)
- name: Set current size
  set_fact:
    current_size: "{{ vol_info.volumes[0].size | int }}"

# ✅ Debug comparison
- name: Compare sizes
  debug:
    msg: "Current={{ current_size }}GB → Target={{ target_size | int }}GB"

# ✅ SCALE BLOCK
- block:

    # ✅ Scale EBS (FIXED MODULE ✅)
    - name: Scale EBS volume
      amazon.aws.ec2_vol:
        region: "{{ aws_region }}"
        id: "{{ volume_id }}"
        volume_size: "{{ target_size | int }}"
        modify_volume: true
      when: (target_size | int) > (current_size | int)

    # ✅ Wait for AWS modification
    - name: Wait for EBS update
      pause:
        seconds: 20

    # ✅ Resize filesystem
    - name: Resize filesystem
      shell: |
        if df -Th | grep xfs; then
          xfs_growfs /
        else
          growpart /dev/xvda 1
          resize2fs /dev/xvda1
        fi

    # ✅ Mark success
    - name: Mark success
      set_fact:
        scale_status: "SUCCESS"

  rescue:

    # ✅ Mark failure
    - name: Mark failure
      set_fact:
        scale_status: "FAILED"

# ✅ Final result log
- name: Show result
  debug:
    msg: "✅ Ticket {{ cr.number }} → {{ scale_status }}"

# ✅ Update ServiceNow (SAFE — NO STATE CHANGE ✅)
- name: Update CR in ServiceNow
  uri:
    url: "{{ snow_instance }}/api/now/table/change_request/{{ cr.sys_id }}"
    method: PATCH
    user: "{{ snow_user }}"
    password: "{{ snow_password }}"
    force_basic_auth: yes
    body_format: json
    headers:
      Content-Type: "application/json"
    body:
      work_notes: |
        ✅ Automation Update

        Ticket: {{ cr.number }}
        Volume: {{ volume_id }}
        Target Size: {{ target_size | int }}GB
        Status: {{ scale_status }}
        Time: {{ ansible_date_time.iso8601 }}

        Message: EBS scaling executed via AAP using IAM role.
