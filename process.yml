# ✅ Extract Volume ID
- name: Extract Volume ID
  set_fact:
    volume_id: "{{ cr.description | regex_search('vol-[a-zA-Z0-9]+') }}"

# ✅ Extract Target Size
- name: Extract raw size
  set_fact:
    target_size_raw: "{{ cr.description | regex_search('[0-9]+') }}"

# ✅ Convert to int
- name: Convert size to int
  set_fact:
    target_size: "{{ target_size_raw | int }}"

# ✅ Debug values
- name: Debug extracted values
  debug:
    msg:
      - "Ticket: {{ cr.number }}"
      - "Volume: {{ volume_id }}"
      - "Raw Size: {{ target_size_raw }}"
      - "Final Size: {{ target_size | int }}"

# ✅ Validate
- name: Validate Volume ID
  fail:
    msg: "❌ Volume ID missing"
  when: volume_id is not defined

- name: Validate Size
  fail:
    msg: "❌ Invalid size"
  when: (target_size | int) <= 0

# ✅ Get current EBS size
- name: Get volume info
  amazon.aws.ec2_vol_info:
    region: "{{ aws_region }}"
    volume_ids:
      - "{{ volume_id }}"
  register: vol_info

- name: Set current size
  set_fact:
    current_size: "{{ vol_info.volumes[0].size }}"

# ✅ Debug compare
- name: Show comparison
  debug:
    msg: "Current={{ current_size }} → Target={{ target_size }}"

# ✅ SCALE
- block:

    - name: Scale EBS ✅
      amazon.aws.ec2_vol:
        region: "{{ aws_region }}"
        volume_id: "{{ volume_id }}"
        size: "{{ target_size | int }}"
        state: present
      when: (target_size | int) > current_size

    - name: Wait
      pause:
        seconds: 20

    - name: Resize filesystem
      shell: |
        if df -Th | grep xfs; then
          xfs_growfs /
        else
          growpart /dev/xvda 1
          resize2fs /dev/xvda1
        fi

    - name: Set success
      set_fact:
        scale_status: "SUCCESS"

  rescue:

    - name: Set failure
      set_fact:
        scale_status: "FAILED"

# ✅ Show result
- name: Show result
  debug:
    msg: "✅ Ticket {{ cr.number }} → {{ scale_status }}"

# ✅ Update ServiceNow
- name: Update CR
  uri:
    url: "{{ snow_instance }}/api/now/table/change_request/{{ cr.sys_id }}"
    method: PATCH
    user: "{{ snow_user }}"
    password: "{{ snow_password }}"
    force_basic_auth: yes
    body_format: json
    headers:
      Content-Type: "application/json"
    body:
      state: "-2"
      work_notes: |
        ✅ Automation Update

        Ticket: {{ cr.number }}
        Volume: {{ volume_id }}
        Size: {{ target_size }}GB
        Status: {{ scale_status }}
        Time: {{ ansible_date_time.iso8601 }}
