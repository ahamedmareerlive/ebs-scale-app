# ✅ Extract Volume ID
- name: Extract Volume ID
  set_fact:
    volume_id: "{{ cr.description | regex_search('vol-[a-zA-Z0-9]+') }}"

# ✅ Extract Target Size (ROBUST FIX ✅)
- name: Extract raw target size
  set_fact:
    target_size_raw: "{{ cr.description | regex_search('[0-9]+') }}"

# ✅ Convert to integer
- name: Convert target size to int ✅
  set_fact:
    target_size: "{{ target_size_raw | int }}"

# ✅ DEBUG (VERY IMPORTANT 🔥)
- name: Debug extracted values
  debug:
    msg:
      - "Ticket: {{ cr.number }}"
      - "Volume ID: {{ volume_id }}"
      - "Raw Size: {{ target_size_raw }}"
      - "Final Size: {{ target_size }}"
      - "Type: {{ target_size | type_debug }}"

# ✅ VALIDATION
- name: Validate Volume ID
  fail:
    msg: "❌ Volume ID missing in {{ cr.number }}"
  when: volume_id is not defined

- name: Validate Target Size ✅
  fail:
    msg: "❌ Invalid size in {{ cr.number }}"
  when: target_size <= 0

# ✅ Get current EBS info (IAM ROLE used ✅)
- name: Get volume info
  amazon.aws.ec2_vol_info:
    region: "{{ aws_region }}"
    volume_ids:
      - "{{ volume_id }}"
  register: vol_info

# ✅ Set current size
- name: Set current size
  set_fact:
    current_size: "{{ vol_info.volumes[0].size }}"

# ✅ Compare sizes
- name: Show size comparison
  debug:
    msg: "Current={{ current_size }}GB → Target={{ target_size }}GB"

# ✅ SCALE BLOCK
- block:

    # ✅ Scale EBS
    - name: Scale EBS volume
      amazon.aws.ec2_vol:
        region: "{{ aws_region }}"
        volume_id: "{{ volume_id }}"
        size: "{{ target_size }}"
        state: present
      when: target_size > current_size

    # ✅ Wait for AWS update
    - name: Wait for EBS modification
      pause:
        seconds: 20

    # ✅ Resize filesystem
    - name: Resize filesystem
      shell: |
        if df -Th | grep xfs; then
          xfs_growfs /
        else
          growpart /dev/xvda 1
          resize2fs /dev/xvda1
        fi

    # ✅ Success
    - name: Mark success
      set_fact:
        scale_status: "SUCCESS"

  rescue:

    # ✅ Failure
    - name: Mark failure
      set_fact:
        scale_status: "FAILED"

# ✅ Show final status
- name: Show result
  debug:
    msg: "✅ Ticket {{ cr.number }} → {{ scale_status }}"

# ✅ Update ServiceNow
- name: Update ServiceNow
  uri:
    url: "{{ snow_instance }}/api/now/table/change_request/{{ cr.sys_id }}"
    method: PATCH
    user: "{{ snow_user }}"
    password: "{{ snow_password }}"
    force_basic_auth: yes
    body_format: json
    headers:
      Content-Type: "application/json"
    body:
      state: "-2"   # Implement ✅
      work_notes: |
        ✅ Automation Update

        Ticket: {{ cr.number }}
        Volume ID: {{ volume_id }}
        Target Size: {{ target_size }}GB
        Status: {{ scale_status }}
        Time: {{ ansible_date_time.iso8601 }}

        Message: Processed automatically from NEW state.
